<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>光合</title>
  <meta name="theme-color" content="#F6F1E9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="光合">
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --r-bg1: #FBF8F2;
      --r-bg2: #EDE4D4;
      --r-card: #FDFAF5;
      --r-inset: #F0E8DA;
      --r-shadow: rgba(120, 80, 30, 0.09);
      --f-bg1: #FBF8F2;
      --f-bg2: #EDE4D4;
      --f-card: #EAF0D8;
      --f-inset: #D0C8A8;
      --f-shadow: rgba(100, 70, 20, 0.10);
      --amber: #A85A38;
      --amber-lt: #D48858;
      --green: #5A8A50;
      --green-dk: #7A3A20;
      --text: #2A1E10;
      --muted: #9A8870;
    }

    html, body {
      height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .page {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    .page.active {
      display: flex;
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #page-record {
      background: linear-gradient(170deg, var(--r-bg1) 0%, var(--r-bg2) 100%);
    }

    #page-forest {
      background: linear-gradient(170deg, var(--f-bg1) 0%, var(--f-bg2) 100%);
    }

    .header {
      padding: 20px 20px 10px;
      flex-shrink: 0;
      background: transparent;
    }

    .header-name {
      font-size: 26px;
      font-weight: 800;
      color: var(--green-dk);
      letter-spacing: 4px;
    }

    .header-sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .nav {
      display: flex;
      height: 60px;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(252, 247, 240, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 -1px 0 rgba(180, 150, 90, 0.15), 0 -4px 20px rgba(120, 85, 30, 0.06);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-btn.active {
      color: var(--green-dk);
    }

    .nav-btn .icon {
      font-size: 20px;
    }

    .nav-btn .label {
      font-size: 11px;
      font-weight: 500;
    }

    .input-card {
      margin: 10px 16px 8px;
      background: var(--r-card);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 2px 20px var(--r-shadow), 0 1px 4px rgba(120, 85, 30, 0.06);
    }

    .input-label {
      font-size: 13px;
      color: var(--green-dk);
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      background: var(--r-inset);
      border: none;
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 12px 14px 44px 14px;
      resize: none;
      height: 88px;
      outline: none;
      transition: box-shadow 0.2s;
      line-height: 1.7;
      box-shadow: inset 0 1px 4px rgba(120, 85, 30, 0.08);
    }

    textarea::placeholder {
      color: var(--muted);
      opacity: 0.75;
    }

    textarea:focus {
      box-shadow: inset 0 1px 4px rgba(120, 85, 30, 0.08), 0 0 0 2px rgba(200, 138, 56, 0.25);
    }

    .mic-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      height: 34px;
      padding: 0 12px;
      border-radius: 99px;
      background: var(--r-card);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      font-family: inherit;
      letter-spacing: 0.5px;
      box-shadow: 0 1px 6px rgba(120, 85, 30, 0.15);
      transition: all 0.2s;
    }

    .mic-btn:active {
      transform: scale(0.92);
    }

    .mic-btn.recording {
      background: #FF5A5A;
      box-shadow: 0 0 0 4px rgba(255, 90, 90, 0.25);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255, 90, 90, 0.25); }
      50% { box-shadow: 0 0 0 7px rgba(255, 90, 90, 0.08); }
    }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(135deg, #C47050, #DC8858);
      color: #FFF8F2;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(160, 80, 40, 0.22);
    }

    .submit-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .list-meta {
      padding: 4px 20px 2px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .list-meta b {
      color: var(--green-dk);
    }

    .export-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--r-card);
      border: 1px solid rgba(160, 120, 80, 0.2);
      border-radius: 99px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .export-btn:active {
      opacity: 0.7;
      transform: scale(0.96);
    }

    .records {
      padding: 6px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rec-card {
      background: var(--r-card);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 2px 12px var(--r-shadow);
      animation: fadeDown 0.3s ease;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rec-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rec-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F0C040;
      display: inline-block;
      box-shadow: 0 0 4px rgba(240, 192, 40, 0.5);
    }

    .rec-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
    }

    .empty {
      text-align: center;
      padding: 60px 30px;
      color: var(--muted);
    }

    .empty .e {
      font-size: 48px;
      margin-bottom: 14px;
    }

    .empty p {
      font-size: 14px;
      line-height: 1.9;
    }

    .forest-header {
      padding: 20px 20px 12px;
      flex-shrink: 0;
      background: transparent;
    }

    .forest-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--green-dk);
      letter-spacing: 4px;
    }

    .forest-stats {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .stat {
      flex: 1;
      background: var(--f-card);
      border-radius: 14px;
      padding: 10px 8px;
      box-shadow: 0 2px 10px var(--f-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .stat-n {
      font-size: 22px;
      font-weight: 800;
      color: var(--green-dk);
    }

    .stat-l {
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .world-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #world-canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    #world-canvas:active {
      cursor: grabbing;
    }

    .merge-float-btn {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #2E6828, #52944A);
      color: #EEF8E8;
      border: none;
      border-radius: 99px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(40, 100, 30, 0.4);
      white-space: nowrap;
      animation: floatUp 0.4s ease;
    }

    .merge-float-btn:active {
      opacity: 0.85;
      transform: translateX(-50%) scale(0.97);
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .world-empty {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #6A8A50;
      pointer-events: none;
    }

    .world-empty .e {
      font-size: 52px;
      margin-bottom: 14px;
    }

    .world-empty p {
      font-size: 14px;
      line-height: 1.9;
      text-align: center;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(44, 56, 32, 0.92);
      color: #E8F5E0;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="page active" id="page-record">
      <div class="header">
        <div class="header-name">光合</div>
        <div class="header-sub">每一缕阳光，都让土地长出一棵小树</div>
      </div>
      <div class="scroll">
        <div class="input-card">
          <div class="input-label">☀️ 今天，有什么让你开心的事？</div>
          <div class="textarea-wrap">
            <textarea id="txt" placeholder="一句话就够，哪怕很小很小的事…" maxlength="200"></textarea>
            <button class="mic-btn" id="mic-btn" onclick="toggleVoice()">语音输入</button>
          </div>
          <button class="submit-btn" onclick="submit()">记录这缕阳光 ✦</button>
        </div>
        <div class="list-meta" id="list-meta"></div>
        <div class="records" id="records"></div>
      </div>
    </div>

    <div class="page" id="page-forest">
      <div class="forest-header">
        <div class="forest-title">我的森林</div>
        <div class="forest-stats" id="f-stats"></div>
      </div>
      <div class="world-wrap">
        <canvas id="world-canvas"></canvas>
        <button class="merge-float-btn" id="merge-float-btn" onclick="merge()">🌳 将 30 棵小树合并成大树</button>
        <div class="world-empty" id="world-empty">
          <div class="e">🌍</div>
          <p>你的森林还是一片空地<br>记录第一缕阳光，让树生长吧</p>
        </div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-btn active" id="nav-record" onclick="go('record')">
        <span class="icon">☀️</span>
        <span class="label">记录</span>
      </button>
      <button class="nav-btn" id="nav-forest" onclick="go('forest')">
        <span class="icon">🌲</span>
        <span class="label">森林</span>
      </button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      var KEY_R = 'gh_records';
      var KEY_B = 'gh_bigtrees';

      function getRecords() {
        return JSON.parse(localStorage.getItem(KEY_R) || '[]');
      }
      function saveRecords(v) {
        localStorage.setItem(KEY_R, JSON.stringify(v));
      }
      function getBig() {
        return parseInt(localStorage.getItem(KEY_B) || '0', 10);
      }
      function saveBig(n) {
        localStorage.setItem(KEY_B, String(n));
      }

      var ISO_TW = 62;
      var ISO_TH = 31;
      var ISO_BH = 17;
      var ISO_COLS = 5;

      var _wCanvas = null;
      var _wCtx = null;
      var _wOX = 0;
      var _wOY = 0;
      var _wDrag = null;
      var _wSmall = 0;
      var _wBig = 0;
      var _wInited = false;

      function bigTreeSVG(scale) {
        scale = scale || 1;
        var w = Math.round(48 * scale);
        var h = Math.round(66 * scale);
        return '<svg viewBox="0 0 48 66" width="' + w + '" height="' + h + '" style="filter:drop-shadow(0 3px 6px rgba(0,0,0,0.18))">' +
          '<rect x="20" y="48" width="8" height="18" rx="3" fill="#4E342E"/>' +
          '<polygon points="24,30 42,48 6,48" fill="#1B5E20"/>' +
          '<polygon points="24,20 40,36 8,36" fill="#2E7D32"/>' +
          '<polygon points="24,10 37,26 11,26" fill="#388E3C"/>' +
          '<polygon points="24,2 33,16 15,16" fill="#4CAF50"/>' +
          '</svg>';
      }

      var curPage = 'record';

      window.go = function(page) {
        if (curPage === page) return;
        curPage = page;

        var pages = document.querySelectorAll('.page');
        var btns = document.querySelectorAll('.nav-btn');
        var i;
        for (i = 0; i < pages.length; i++) pages[i].classList.remove('active');
        for (i = 0; i < btns.length; i++) btns[i].classList.remove('active');

        document.getElementById('page-' + page).classList.add('active');
        document.getElementById('nav-' + page).classList.add('active');

        if (page === 'forest') {
          renderForest();
        } else {
          renderRecords();
        }
      };

      window.submit = function() {
        var txt = document.getElementById('txt');
        var val = txt.value.trim();
        if (!val) { toast('✍️ 写点什么吧~'); return; }

        var now = new Date();
        var recs = getRecords();
        recs.unshift({
          id: now.getTime(),
          text: val,
          date: fmtDate(now),
          time: fmtTime(now)
        });
        saveRecords(recs);
        txt.value = '';
        renderRecords();
        toast('☀️ 又一缕阳光照进来了！');
      };

      function renderRecords() {
        var recs = getRecords();
        var big = getBig();
        var meta = document.getElementById('list-meta');

        meta.innerHTML = recs.length
          ? '<span>共记录 <b>' + recs.length + '</b> 缕阳光 · 已长成 <b>' + big + '</b> 棵大树</span><button class="export-btn" onclick="exportPDF()">📄 导出手帐</button>'
          : '';

        var el = document.getElementById('records');
        if (!recs.length) {
          el.innerHTML = '<div class="empty"><div class="e">🌱</div><p>还没有记录<br>写下今天的第一缕阳光吧</p></div>';
          return;
        }

        var html = [];
        var i;
        for (i = 0; i < recs.length; i++) {
          var r = recs[i];
          html.push('<div class="rec-card"><div class="rec-meta"><span class="rec-dot"></span>&nbsp;' + r.date + '&nbsp;&nbsp;' + (r.time || '') + '</div><div class="rec-text">' + esc(r.text) + '</div></div>');
        }
        el.innerHTML = html.join('');
      }

      function renderForest() {
        var recs = getRecords();
        var big = getBig();
        var small = recs.length - big * 30;

        document.getElementById('f-stats').innerHTML =
          '<div class="stat"><div class="stat-n">' + recs.length + '</div><div class="stat-l">☀️</div></div>' +
          '<div class="stat"><div class="stat-n">' + small + '</div><div class="stat-l" style="font-size:22px">🌱</div></div>' +
          '<div class="stat"><div class="stat-n">' + big + '</div><div class="stat-l">' + bigTreeSVG(0.42) + '</div></div>';

        var mb = document.getElementById('merge-float-btn');
        mb.style.display = small >= 30 ? 'flex' : 'none';

        var emptyEl = document.getElementById('world-empty');
        emptyEl.style.display = (!recs.length && !big) ? 'flex' : 'none';

        _wSmall = small;
        _wBig = big;

        var canvas = document.getElementById('world-canvas');
        if (!_wCanvas) {
          _wCanvas = canvas;
          _wCtx = canvas.getContext('2d');
          _setupDrag(canvas);
          window.addEventListener('resize', _resizeAndDraw);
        }

        requestAnimationFrame(_resizeAndDraw);
      }

      window.merge = function() {
        var recs = getRecords();
        var big = getBig();
        var small = recs.length - big * 30;
        if (small < 30) return;

        saveBig(big + 1);
        _wSmall = small - 30;
        _wBig = big + 1;

        document.getElementById('merge-float-btn').style.display = 'none';

        document.getElementById('f-stats').innerHTML =
          '<div class="stat"><div class="stat-n">' + recs.length + '</div><div class="stat-l">☀️</div></div>' +
          '<div class="stat"><div class="stat-n">' + _wSmall + '</div><div class="stat-l" style="font-size:22px">🌱</div></div>' +
          '<div class="stat"><div class="stat-n">' + _wBig + '</div><div class="stat-l">' + bigTreeSVG(0.42) + '</div></div>';

        toast('🌳 30 棵小树长成了一棵大树！');
        requestAnimationFrame(_resizeAndDraw);
      };

      function _resizeAndDraw() {
        if (!_wCanvas) return;
        var dpr = window.devicePixelRatio || 1;
        var cw = _wCanvas.offsetWidth;
        var ch = _wCanvas.offsetHeight;
        if (!cw || !ch) return;

        _wCanvas.width = Math.round(cw * dpr);
        _wCanvas.height = Math.round(ch * dpr);
        _wCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (!_wInited) {
          _wInited = true;
          var rows = Math.max(3, Math.ceil((_wSmall + _wBig) / ISO_COLS) + 2);
          _wOX = cw / 2 + (ISO_COLS - rows) * (ISO_TW / 4);
          _wOY = ch * 0.12 + ISO_TH;
        }

        _drawWorld();
      }

      function _drawWorld() {
        var ctx = _wCtx;
        var cw = _wCanvas.offsetWidth;
        var ch = _wCanvas.offsetHeight;

        var bg = ctx.createLinearGradient(0, 0, 0, ch);
        bg.addColorStop(0, '#B8DCF0');
        bg.addColorStop(0.55, '#CCEAB4');
        bg.addColorStop(1, '#BED890');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, cw, ch);

        var cells = [];
        var i;
        for (i = 0; i < _wBig; i++) cells.push('big');
        for (i = 0; i < _wSmall; i++) cells.push('small');

        var totalRows = Math.max(3, Math.ceil(Math.max(1, cells.length) / ISO_COLS) + 1);
        var maxDepth = (ISO_COLS - 1) + (totalRows - 1);

        var d, c;
        for (d = 0; d <= maxDepth; d++) {
          for (c = 0; c < ISO_COLS; c++) {
            var r = d - c;
            if (r < 0 || r >= totalRows) continue;

            var idx = r * ISO_COLS + c;
            var type = cells[idx] || 'empty';
            var sx = _wOX + (c - r) * (ISO_TW / 2);
            var sy = _wOY + (c + r) * (ISO_TH / 2);

            _drawBlock(ctx, sx, sy, type);

            var bx = sx;
            var by = sy + ISO_TH / 2;

            if (type === 'small') _drawSmallTree(ctx, bx, by);
            if (type === 'big') _drawBigTree(ctx, bx, by);
          }
        }
      }

      function _drawBlock(ctx, sx, sy, type) {
        var top;
        if (type === 'empty') top = '#AACE6E';
        else if (type === 'big') top = '#88B845';
        else top = '#94C250';

        var TW = ISO_TW;
        var TH = ISO_TH;
        var BH = ISO_BH;

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + TW / 2, sy + TH / 2);
        ctx.lineTo(sx, sy + TH);
        ctx.lineTo(sx - TW / 2, sy + TH / 2);
        ctx.closePath();
        ctx.fillStyle = top;
        ctx.fill();

        var sh = ctx.createLinearGradient(sx, sy, sx, sy + TH);
        sh.addColorStop(0, 'rgba(255,255,255,0.28)');
        sh.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = sh;
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + TW / 2, sy + TH / 2);
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx - TW / 2, sy + TH / 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(sx - TW / 2, sy + TH / 2);
        ctx.lineTo(sx, sy + TH);
        ctx.lineTo(sx, sy + TH + BH);
        ctx.lineTo(sx - TW / 2, sy + TH / 2 + BH);
        ctx.closePath();
        ctx.fillStyle = '#7A9C3E';
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(sx, sy + TH);
        ctx.lineTo(sx + TW / 2, sy + TH / 2);
        ctx.lineTo(sx + TW / 2, sy + TH / 2 + BH);
        ctx.lineTo(sx, sy + TH + BH);
        ctx.closePath();
        ctx.fillStyle = '#688030';
        ctx.fill();
      }

      function _drawSmallTree(ctx, bx, by) {
        ctx.save();
        ctx.globalAlpha = 0.13;
        ctx.beginPath();
        ctx.ellipse(bx + 3, by - 1, 10, 4, -0.25, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = '#6B4423';
        ctx.fillRect(bx - 3, by - 16, 6, 16);

        var levels = [
          { w: 10, b: by - 6, c: '#4A8F30' },
          { w: 7, b: by - 12, c: '#5AB838' },
          { w: 4, b: by - 17, c: '#6BC842' }
        ];

        var j;
        for (j = 0; j < levels.length; j++) {
          var level = levels[j];
          var tip = level.b - 8;
          ctx.beginPath();
          ctx.moveTo(bx, tip);
          ctx.lineTo(bx + level.w, level.b);
          ctx.lineTo(bx - level.w, level.b);
          ctx.closePath();
          ctx.fillStyle = level.c;
          ctx.fill();
        }
      }

      function _drawBigTree(ctx, bx, by) {
        ctx.save();
        ctx.globalAlpha = 0.15;
        ctx.beginPath();
        ctx.ellipse(bx + 5, by - 1, 15, 6, -0.25, 0, Math.PI * 2);
        ctx.fillStyle = '#000';
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = '#7A4820';
        ctx.fillRect(bx - 5, by - 36, 10, 36);
        ctx.fillStyle = '#5A3010';
        ctx.fillRect(bx, by - 36, 5, 36);

        var levels = [
          { w: 24, b: by - 12, c1: '#387820', c2: '#2A6018' },
          { w: 19, b: by - 26, c1: '#48902A', c2: '#387820' },
          { w: 15, b: by - 38, c1: '#58A834', c2: '#48902A' },
          { w: 11, b: by - 48, c1: '#68BE3E', c2: '#58A834' },
          { w: 7, b: by - 56, c1: '#78D04A', c2: '#68BE3E' }
        ];

        var j;
        for (j = 0; j < levels.length; j++) {
          var level = levels[j];
          var tip = level.b - 14;
          ctx.beginPath();
          ctx.moveTo(bx, tip);
          ctx.lineTo(bx + level.w, level.b);
          ctx.lineTo(bx - level.w, level.b);
          ctx.closePath();
          ctx.fillStyle = level.c1;
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(bx, tip);
          ctx.lineTo(bx + level.w, level.b);
          ctx.lineTo(bx, level.b);
          ctx.closePath();
          ctx.fillStyle = level.c2;
          ctx.fill();
        }
      }

      function _setupDrag(canvas) {
        canvas.addEventListener('touchstart', function(e) {
          var t = e.touches[0];
          _wDrag = { sx: t.clientX, sy: t.clientY, ox: _wOX, oy: _wOY };
        }, { passive: true });

        canvas.addEventListener('touchmove', function(e) {
          if (!_wDrag) return;
          e.preventDefault();
          var t = e.touches[0];
          _wOX = _wDrag.ox + t.clientX - _wDrag.sx;
          _wOY = _wDrag.oy + t.clientY - _wDrag.sy;
          _drawWorld();
        }, { passive: false });

        canvas.addEventListener('touchend', function() { _wDrag = null; }, { passive: true });

        canvas.addEventListener('mousedown', function(e) {
          _wDrag = { sx: e.clientX, sy: e.clientY, ox: _wOX, oy: _wOY };
          canvas.style.cursor = 'grabbing';
        });

        canvas.addEventListener('mousemove', function(e) {
          if (!_wDrag) return;
          _wOX = _wDrag.ox + e.clientX - _wDrag.sx;
          _wOY = _wDrag.oy + e.clientY - _wDrag.sy;
          _drawWorld();
        });

        canvas.addEventListener('mouseup', function() {
          _wDrag = null;
          canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('mouseleave', function() {
          _wDrag = null;
          canvas.style.cursor = 'grab';
        });
      }

      var voiceRec = null;

      window.toggleVoice = function() {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { toast('当前浏览器不支持语音输入'); return; }

        var btn = document.getElementById('mic-btn');
        if (voiceRec) { voiceRec.stop(); return; }

        voiceRec = new SR();
        voiceRec.lang = 'zh-CN';
        voiceRec.continuous = true;
        voiceRec.interimResults = false;

        voiceRec.onstart = function() {
          btn.classList.add('recording');
          btn.textContent = '录音中…';
        };

        voiceRec.onresult = function(e) {
          var txt = document.getElementById('txt');
          var k;
          for (k = e.resultIndex; k < e.results.length; k++) {
            if (e.results[k].isFinal) {
              txt.value += e.results[k][0].transcript;
            }
          }
        };

        voiceRec.onerror = function() {
          toast('语音识别失败，请重试');
          stopVoice();
        };

        voiceRec.onend = function() { stopVoice(); };
        voiceRec.start();
      };

      function stopVoice() {
        voiceRec = null;
        var btn = document.getElementById('mic-btn');
        btn.classList.remove('recording');
        btn.textContent = '语音输入';
      }

      var toastTimer;

      function toast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2600);
      }

      function fmtDate(d) {
        return (d.getMonth() + 1) + '月' + d.getDate() + '日';
      }

      function fmtTime(d) {
        return pad(d.getHours()) + ':' + pad(d.getMinutes());
      }

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      window.exportPDF = function() {
        var recs = getRecords();
        if (!recs.length) { toast('还没有记录可以导出～'); return; }

        var now = new Date();
        var exportDate = now.getFullYear() + ' 年 ' + (now.getMonth() + 1) + ' 月 ' + now.getDate() + ' 日';

        var entries = [];
        var m;
        for (m = 0; m < recs.length; m++) {
          var r = recs[m];
          entries.push('<div class="entry"><div class="entry-date">' + r.date + (r.time ? ' ' + r.time : '') + '</div><div class="entry-dot"></div><div class="entry-text">' + esc(r.text) + '</div></div>');
        }

        var html = '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>光合 · 我的美好记录</title><style>' +
          '*{margin:0;padding:0;box-sizing:border-box}' +
          'body{font-family:"PingFang SC",-apple-system,sans-serif;background:#FAF7F1;color:#2A1E10;padding:48px 60px}' +
          '.entries-area{background-image:repeating-linear-gradient(transparent 0,transparent 39px,#DDD0B8 39px,#DDD0B8 40px)}' +
          '.header{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:18px;border-bottom:2px solid #C8A878}' +
          '.app-name{font-size:30px;font-weight:800;color:#7A3A20;letter-spacing:6px}' +
          '.app-sub{font-size:12px;color:#9A8870;margin-top:5px;letter-spacing:1px}' +
          '.export-info{font-size:12px;color:#9A8870;text-align:right;line-height:1.8}' +
          '.entry{display:flex;align-items:flex-start;gap:20px;min-height:40px;page-break-inside:avoid}' +
          '.entry-date{flex-shrink:0;width:140px;font-size:11px;color:#C08050;line-height:40px}' +
          '.entry-dot{flex-shrink:0;width:7px;height:7px;border-radius:50%;background:#F0C040;margin-top:17px;box-shadow:0 0 4px rgba(240,192,40,.5)}' +
          '.entry-text{flex:1;font-size:14px;line-height:40px;color:#2A1E10}' +
          '.footer{margin-top:48px;padding-top:16px;border-top:1px solid #DDD0B8;font-size:11px;color:#9A8870;text-align:center;letter-spacing:2px}' +
          '@media print{body{padding:40px 56px}}' +
          '</style></head><body>' +
          '<div class="header"><div><div class="app-name">光合</div><div class="app-sub">每一缕阳光，都让土地长出一棵小树</div></div><div class="export-info">导出于 ' + exportDate + '<br>共 ' + recs.length + ' 条记录</div></div>' +
          '<div class="entries-area">' + entries.join('') + '</div>' +
          '<div class="footer">光合 · 美好记录 | 愿每一缕阳光都被好好珍藏</div>' +
          '<script>window.onload=function(){window.print()}<\/script>' +
          '</body></html>';

        var win = window.open('', '_blank');
        if (win) {
          win.document.write(html);
          win.document.close();
        } else {
          toast('请允许弹出窗口后重试');
        }
      };

      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          window.submit();
        }
      });

      renderRecords();
    })();
  </script>
</body>
